<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form Biology Olympiad SMA N 20 SEMARANG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        .dataTables_wrapper .dataTables_length select, 
        .dataTables_wrapper .dataTables_filter input {
            @apply border border-gray-300 rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-green-500;
        }
        table.dataTable { border-collapse: collapse !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    
    <nav class="bg-green-700 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="{{ url_for('index') }}" class="text-white font-bold text-lg tracking-tight">
                    Bio-Olympiad
                </a>
            <div class="flex items-center space-x-4">
                {% if role == 'guest' %}
                    <a href="{{ url_for('login_page') }}" class="text-white hover:text-green-200 text-sm font-semibold">Login</a>
                    <a href="{{ url_for('register_page') }}" class="bg-white text-green-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-50 transition">Daftar</a>
                {% else %}
                    <span class="text-green-100 text-sm mr-2 italic">Role: {{ role }}</span>
                    <a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Logout</a>
                {% endif %}
            </div>
            </div>
        </div>
    </nav>
  
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block body %}
        {% endblock %}
    </main>

    <script>
        $(document).on('click', '.btn-delete', function(e) {
            if(!confirm('are you sure deleting this data?')) {
                e.preventDefault();
            }
        });

        $(document).ready(function() {
            $('#example').DataTable({
                "pageLength": 5,
                "lengthMenu": [[5, 10, 25, -1], [5, 10, 25, "Semua"]],
                "language": {
                    "search": "Search Student",
                    "lengthMenu": "Tampilkan _MENU_ data"
                }
            });
        });
    </script>
</body>
</html>
