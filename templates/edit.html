{% extends "layout.html" %}
{% block body %}
<div class="flex flex-col items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">
        <div class="bg-amber-500 p-4 text-white text-center">
            <h2 class="font-bold uppercase tracking-widest">Update Student Data</h2>
        </div>
        <form action="/edit/{{ data.id }}" method="POST" class="p-8 space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">First Name</label>
                <input type="text" name="fname" value="{{ data.fname }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition">
            </div>
            
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Last Name</label>
                <input type="text" name="lname" value="{{ data.lname }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition">
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 uppercase ml-1">Phone Number</label>
                <input type="text" name="phone" value="{{ data.phone }}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition">
            </div>

            <div class="flex gap-4 pt-4">
                <a href="/" class="flex-1 bg-slate-100 text-slate-600 text-center py-3 rounded-xl font-bold hover:bg-slate-200 transition">Cancel</a>
                <button type="submit" class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-bold hover:bg-amber-600 transition shadow-lg shadow-amber-100">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
